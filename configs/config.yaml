llm:
  provider: "api"  # Change to "local" for Ollama
  model: "llama3"
  api_model: "gemini-1.5-flash"
  temperature: 0.1
  request_timeout: 120.0

embedding:
  provider: "api"  # Change to "local" for sentence-transformers
  model_name: "all-MiniLM-L6-v2"
  api_model: "models/embedding-001"
  device: "cpu"

storage:
  chroma_db_path: "./chroma_db"
  data_dir: "./data"

log_level: "INFO"
